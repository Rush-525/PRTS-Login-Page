<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRTS - Rhodes Island Terminal Service</title>
    <style>
        :root {
            --bg: #f0f0f0;
            --primary: #000000;
            --secondary: #333333;
            --accent: #666666;
            --line: #cccccc;
            --font-system: 'Courier New', 'Consolas', monospace;
            --font-display: 'Arial Black', 'Helvetica Neue', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--primary);
            font-family: var(--font-system);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 顶部导航 */
        .top-bar {
            position: absolute;
            top: 24px; right: 40px;
            font-size: 11px; letter-spacing: 2px;
            color: var(--secondary);
            opacity: 0; z-index: 2;
            animation: fadeIn 0.6s 0.2s forwards;
        }
        .top-bar strong { color: var(--primary); font-weight: 700; }

        /* 背景菱形 */
        .bg-diamond {
            position: absolute;
            top: 50%; left: 50%;
            width: min(65vw, 780px);
            height: min(65vw, 780px);
            border: 35px solid var(--line);
            opacity: 0; z-index: 0;
            transform: translate(-50%, -50%) rotate(45deg) scale(0.85);
            animation: diamondIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .bg-diamond::after {
            content: '';
            position: absolute;
            inset: 16px;
            border: 10px solid var(--line);
            opacity: 0.4;
        }

        /* Logo 区域 */
        .logo-wrap {
            position: absolute;
            left:230px; top: 50%;
            transform: translateY(-50%);
            opacity: 0; z-index: 2;
            animation: slideLeft 0.6s 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .logo-main {
            font-family: var(--font-display);
            font-size: 100px; font-weight: bold;
            /* font-size: clamp(3rem, 8vw, 7rem);
            font-weight: bold; */

            letter-spacing: 3px; line-height: 1;
            margin-bottom: 6px; position: relative;
        }
        .logo-main::after {
            content: ''; position: absolute;
            bottom: -4px; left: 0;
            width: 100%; height: 3px;
            background: var(--primary);
        }
        .logo-sub {
            font-size: 16px; letter-spacing: 1px;
            color: var(--accent); line-height: 1.4;
            opacity: 0;
            animation: fadeUp 0.5s 0.6s forwards;
        }

        /* 登录表单 */
        .form-wrap {
            position: absolute;
            right: 42%; top: 50%;
            transform: translateY(-50%) translateX(60px);
            opacity: 0; z-index: 2;
            animation: slideRight 0.5s 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            width: 320px;
        }
        .form-group { margin-bottom: 28px; position: relative; }
        .form-label {
            font-size: 11px; font-weight: 700;
            letter-spacing: 2px; margin-bottom: 8px; display: block;
        }
        .form-input {
            width: 100%; padding: 8px 0;
            border: none; border-bottom: 2px solid var(--line);
            background: transparent; font-family: var(--font-system);
            font-size: 14px; outline: none;
            transition: border-color 0.3s, border-width 0.3s;
        }
        .form-input:focus {
            border-bottom-color: var(--primary);
            border-bottom-width: 3px;
        }
        .form-line {
            position: absolute; bottom: 0; left: 50%;
            width: 0; height: 2px; background: var(--primary);
            transform: translateX(-50%); transition: width 0.3s ease;
        }
        .form-input:focus ~ .form-line { width: 100%; }

        .forgot-link {
            display: block; margin-top: 6px;
            font-size: 9px; color: var(--accent);
            text-decoration: underline; text-underline-offset: 2px;
            cursor: pointer; opacity: 0;
            animation: fadeIn 0.4s 1s forwards;
        }
        .forgot-link:hover { color: var(--primary); }

        .login-btn {
            width: 100%; padding: 12px;
            background: var(--primary); color: #fff; border: none;
            font-family: var(--font-display); font-size: 13px;
            letter-spacing: 3px; cursor: pointer; margin-top: 10px;
            transition: all 0.2s ease; opacity: 0;
            animation: fadeIn 0.4s 1.1s forwards;
        }
        .login-btn:hover {
            background: #fff; color: var(--primary);
            outline: 2px solid var(--primary); transform: scale(1.02);
        }
        .login-btn:active { transform: scale(0.96); opacity: 0.85; }

        /* 遮罩提示 */
        .mask-tip {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--primary); color: #fff;
            padding: 18px 48px; font-family: var(--font-display);
            font-size: 28px; letter-spacing: 4px;
            z-index: 999; display: none; opacity: 0;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 进度条 */
        .progress-wrap {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 560px; display: none; z-index: 2;
        }
        .progress-track {
            width: 100%; height: 36px;
            border: 2px solid var(--line);
            position: relative; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%; background: var(--primary);
            position: relative; transition: width 0.05s linear;
        }
        .progress-hatch {
            position: absolute; right: 0; top: 0;
            width: 80px; height: 100%;
            background: repeating-linear-gradient(
                -45deg, transparent, transparent 8px,
                rgba(255,255,255,0.25) 8px, rgba(255,255,255,0.25) 16px
            );
            animation: hatchMove 0.8s linear infinite;
        }
        .progress-num {
            text-align: center; margin-top: 14px;
            font-size: 22px; font-weight: 700; letter-spacing: 2px;
        }

        /* 欢迎语 */
        .welcome-msg {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-display); font-size: 45px;
            /* font-weight: 700; letter-spacing: 10px; */
            opacity: 0; filter: blur(10px);
            display: none; z-index: 2;
            transition: filter 0.8s ease, letter-spacing 0.8s ease;
        }

        /* 底部信息 */
        .footer {
            position: absolute; bottom: 36px; left: 50%;
            transform: translateX(-50%); text-align: center;
            opacity: 0; z-index: 2;
            animation: fadeIn 0.6s 0.3s forwards;
        }
        .footer-text { font-size: 10px; letter-spacing: 1px; color: var(--secondary); margin-bottom: 8px; }
        .footer-ver { font-size: 9px; color: var(--accent); }
        .footer-dots { display: flex; justify-content: center; gap: 24px; margin-top: 12px; }
        .dot {
            width: 7px; height: 7px; background: var(--accent);
            transform: rotate(45deg); opacity: 0.3;
            animation: dotPulse 2.4s infinite;
        }
        .dot:nth-child(3) { background: var(--primary); opacity: 1; }
        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }

        /* 动画关键帧 */
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes diamondIn { to { opacity: 1; transform: translate(-50%, -50%) rotate(45deg) scale(1); } }
        @keyframes slideLeft { from { opacity: 0; transform: translateY(-50%) translateX(-40px); } to { opacity: 1; transform: translateY(-50%) translateX(0); } }
        @keyframes slideRight { to { opacity: 1; transform: translateY(-50%) translateX(0); } }
        @keyframes hatchMove { from { transform: translateX(0); } to { transform: translateX(-16px); } }
        @keyframes dotPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.9; } }
    </style>
</head>
<body>

    <div class="top-bar">POWERED BY <strong>RHODES ISLAND</strong></div>
    <div class="bg-diamond"></div>

    <div class="logo-wrap">
        <div class="logo-main">PRTS</div>
        <div class="logo-sub">SYNTHESIZE INFORMATION<br>ANALYSIS OS</div>
    </div>

    <div class="form-wrap" id="loginForm">
        <div class="form-group">
            <label class="form-label">USERNAME:</label>
            <input type="text" class="form-input" id="username" autocomplete="off">
            <div class="form-line"></div>
        </div>
        <div class="form-group">
            <label class="form-label">PASSWORD:</label>
            <input type="password" class="form-input" id="password">
            <div class="form-line"></div>
            <span class="forgot-link">FORGOT YOUR PASSWORD?</span>
        </div>
        <button class="login-btn" id="loginBtn">LOGIN</button>
    </div>

    <div class="mask-tip" id="maskTip">PLEASE LOG IN</div>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill">
                <div class="progress-hatch"></div>
            </div>
        </div>
        <div class="progress-num" id="progressNum">0%</div>
    </div>

    <div class="welcome-msg" id="welcomeMsg">WELCOME BACK DOCTOR</div>

    <div class="footer">
        <div class="footer-text">PRIMITIVE RHODES ISLAND TERMINAL SERVICE</div>
        <div class="footer-ver">SYSTEM v3.1</div>
        <div class="footer-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const form = $('loginForm');
        const mask = $('maskTip');
        const progress = $('progressWrap');
        const fill = $('progressFill');
        const num = $('progressNum');
        const welcome = $('welcomeMsg');
        const btn = $('loginBtn');

        function showMask() {
            mask.style.display = 'block';
            requestAnimationFrame(() => {
                mask.style.opacity = '1';
                mask.style.transform = 'translate(-50%, -50%) scale(1)';
            });
            setTimeout(() => {
                mask.style.opacity = '0';
                mask.style.transform = 'translate(-50%, -60%) scale(1)';
                setTimeout(() => mask.style.display = 'none', 300);
            }, 1600);
        }

        function runProgress() {
            return new Promise(res => {
                let p = 0;
                const iv = setInterval(() => {
                    p += Math.random() * 4 + 1;
                    if (p >= 100) { p = 100; clearInterval(iv); setTimeout(res, 400); }
                    fill.style.width = p + '%';
                    num.textContent = Math.floor(p) + '%';
                }, 25);
            });
        }

        function showWelcome() {
            progress.style.display = 'none';
            welcome.style.display = 'block';
            requestAnimationFrame(() => {
                welcome.style.opacity = '1';
                welcome.style.filter = 'blur(0)';
                welcome.style.letterSpacing = '4px';
            });
        }

        btn.addEventListener('click', () => {
            const u = $('username').value.trim();
            const p = $('password').value.trim();
            if (!u || !p) { showMask(); return; }

            form.style.transition = 'all 0.4s ease';
            form.style.opacity = '0';
            form.style.transform = 'translateY(-50%) translateX(-40px)';

            setTimeout(() => {
                form.style.display = 'none';
                progress.style.display = 'block';
                runProgress().then(showWelcome);
            }, 400);
        });

        $('password').addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
        document.querySelectorAll('.form-input').forEach(el => {
            el.addEventListener('focus', () => el.parentElement.querySelector('.form-label').style.color = '#000');
            el.addEventListener('blur', () => el.parentElement.querySelector('.form-label').style.color = '#333');
        });
    </script>
</body>
</html>
