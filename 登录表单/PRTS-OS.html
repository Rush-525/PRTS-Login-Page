<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRTS - Rhodes Island Terminal Service</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            background-color: #f0f0f0;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* 左右两侧加粗线条 */
        .side-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 60px;
            background-color: #dadada;
            z-index: 10;
        }
        
        /* .left-line { */
            /* left: 5%; */
            
        /* } */
        
        .right-line {
            right: 0;
        }
        
        /* 主容器样式 */
        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #f0f0f0;
            overflow: hidden;
        }
        
        /* 顶部标识 */
        .top-marker {
            position: absolute;
            top: 20px;
            right: 5%;
            font-size: 12px;
            letter-spacing: 2px;
            color: #333;
            display: flex;
            align-items: center;
            z-index: 20;
        }
        
        .dot {
            width: 13px;
            height: 13px;
            background-color: black;
            margin-left: 20px;
        }
        
        /* 背景中间加粗大菱形 */
        .diamond-decoration {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 50vw;
            height: 50vw;
            max-width: 70vh;
            max-height: 70vh;
            border: 40px solid #d6d6d6;
            z-index: 5;
        }
        
        /* 1. PRTS标识（左移，R贴着大菱形左角） */
        .prts-logo {
            position: absolute;
            top: 50%;
            left: calc(20% - 40px); /* 进一步左移 */
            transform: translate(0, -50%);
            text-align: left;
            z-index: 20;
        }
        
        .prts-title {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: bold;
            letter-spacing: -2px;
            margin-bottom: 10px;
            line-height: 1;
            position: relative;
        }
        
        .prts-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #333;
        }
        
        .prts-subtitle {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #333;
            margin-top: 10px;
        }
        
        .prts-os {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        /* 登录表单（居中在大菱形内） */
        .login-form {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(250px, 25vw, 350px);
            z-index: 20;
            /* 为表单添加固定宽度容器，确保对齐 */
        }
        
        .form-group {
            margin-bottom: 45px; /* 保持用户名与密码的大间距 */
        }
        
        .form-label {
            display: inline-block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #333;
            margin-bottom: 8px;
            width: 80px; /* 固定宽度，确保U和P首字母对齐 */
        }
        
        /* 2. 缩短密码输入框 */
        .password-container {
            display: inline-block;
            width: calc(100% - 80px); /* 计算宽度，确保在PASSWORD冒号后 */
        }
        
        .form-control {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 8px 0;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: black;
        }
        
        /* 2. FORGOT YOUR PASSWORD?放在PASSWORD下面 */
        .forgot-link-container {
            text-align: right; /* 3. 右对齐PASSWORD */
            margin-top: 4px;
        }
        
        .forgot-link {
            font-size: 11px;
            color: #666;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .forgot-link:hover {
            color: black;
        }
        
        .btn-login {
            width: 100%;
            background-color: black;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 15px;
        }
        
        .btn-login:hover {
            background-color: #333;
        }
        
        .btn-login:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        
        /* 底部信息 */
        .bottom-info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 20;
        }
        
        .system-name {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #333;
        }
        
        .system-version {
            font-size: 10px;
            color: #666;
            margin-top: 5px;
        }
        
        /* 底部分段线条（连接首尾菱形，菱形间无线条） */
        .bottom-bar {
            position: absolute;
            bottom: 34px;
            height: 2px;
            background-color: #333;
            z-index: 15;
        }
        
        .left-bottom-bar {
            left: 5%;
            right: calc(50% + 48px);
        }
        
        .right-bottom-bar {
            left: calc(50% + 48px);
            right: 5%;
        }
        
        /* 底部菱形容器 */
        .bottom-markers {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 20;
        }
        
        .small-diamond {
            width: 9px;
            height: 9px;
            background-color: #333;
            transform: rotate(45deg);
        }
        
        .large-diamond {
            width: 15px;
            height: 15px;
            border: 1px solid #333;
            background-color: transparent;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>
    <!-- 左右两侧加粗线条 -->
    <div class="side-line left-line"></div>
    <div class="side-line right-line"></div>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 顶部标识 -->
        <div class="top-marker">
            <span>POWERED BY RHODES ISLAND</span>
            <div class="dot"></div>
        </div>
        
        <!-- 中间加粗大菱形 -->
        <div class="diamond-decoration"></div>
        
        <!-- PRTS标识（左移，R贴着大菱形左角） -->
        <div class="prts-logo">
            <div class="prts-title">PRTS</div>
            <div class="prts-subtitle">SYNTHESIZE INFORMATION</div>
            <div class="prts-os">ANALYSIS OS</div>
        </div>
        
        <!-- 登录表单（居中在菱形内） -->
        <div class="login-form">
            <form id="loginForm">
                <!-- 用户名（与密码首字母对齐） -->
                <div class="form-group">
                    <label class="form-label">USERNAME:</label>
                    <div class="password-container">
                        <input type="text" placeholder="" class="form-control" id="username">

                    </div>
                    <!-- <label class="form-label">USERNAME:</label> -->
                    <!-- <span>Doctor</span> -->
                </div>
                
                <!-- 密码（缩短横线，FORGOT放在下面并右对齐） -->
                <div class="form-group">
                    <label class="form-label">PASSWORD:</label>
                    <div class="password-container">
                        <input type="password" placeholder="" class="form-control" id="password">
                        <div class="forgot-link-container">
                            <a href="#" class="forgot-link">FORGOT YOUR PASSWORD?</a>
                        </div>
                    </div>
                </div>
                
                <!-- 登录按钮 -->
                <button type="submit" class="btn-login" id="loginBtn">LOGIN</button>
            </form>
        </div>
        
        <!-- 底部信息 -->
        <div class="bottom-info">
            <div class="system-name">PRIMITIVE RHODES ISLAND TERMINAL SERVICE</div>
            <div class="system-version">SYSTEM v3.1</div>
        </div>
        
        <!-- 底部分段线条 -->
        <div class="bottom-bar left-bottom-bar"></div>
        <div class="bottom-bar right-bottom-bar"></div>
        
        <!-- 底部菱形（间无线条） -->
        <div class="bottom-markers">
            <div class="small-diamond"></div>
            <div class="small-diamond"></div>
            <div class="large-diamond"></div>
            <div class="small-diamond"></div>
            <div class="small-diamond"></div>
        </div>
    </div>

    <script>
        // 登录交互逻辑
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            
            // 密码空验证
            if (!passwordInput.value) {
                passwordInput.style.borderColor = '#ef4444';
                setTimeout(() => {
                    passwordInput.style.borderColor = '#333';
                }, 1500);
                return;
            }
            
            // 模拟登录加载状态
            loginBtn.disabled = true;
            loginBtn.textContent = 'ACCESSING...';
            
            // 模拟登录成功
            setTimeout(() => {
                alert('ACCESS');
                alert('WELCOME BACK DOCTOR');
                loginBtn.disabled = false;
                loginBtn.textContent = 'LOGIN';
                passwordInput.value = '';
            }, 1500);
        });
    </script>
</body>
</html>
