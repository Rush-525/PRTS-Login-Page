<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRTS - Rhodes Island Terminal Service</title>
<style>
    /* 全局设置 */
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #e8e8e8; /* 调整为更贴近视频的浅灰底色 */
        font-family: 'Helvetica Neue', Arial, sans-serif;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #000;
    }

    /* 开场线段动画 */
    .intro-lines {
        position: absolute;
        width: 220px;
        height: 1px;
        background: transparent;
        z-index: 5;
        /* transition: all 0.3s ease-out; */
        transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .intro-lines::before, .intro-lines::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 1px;
        background: #000;
        /* transition: transform 0.3s ease-in-out; */
        transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .intro-lines.step1::before { transform: translateY(0); }
    .intro-lines.step1::after { transform: translateY(0); }
    .intro-lines.step2::before { transform: translateY(-60px); }
    .intro-lines.step2::after { transform: translateY(60px); }
    .intro-lines.hidden { opacity: 0; }

    /* 背景菱形 */
    .diamond-bg {
        position: absolute;
        width: 45vw;
        height: 45vw;
        background-color: #dfdfdf;
        border: 30px solid #f2f2f2;
        box-sizing: border-box;
        transform: rotate(45deg) scale(0);
        z-index: 0;
        transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s;
    }
    .diamond-bg.active {
        transform: rotate(45deg) scale(1);
    }
    .inner-border {
        position: absolute;
        width: 48vw;
        height: 48vw;
        border: 1px solid rgba(0,0,0,0.05);
        transform: rotate(45deg) scale(0);
        z-index: 1;
        pointer-events: none;
        transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
    }
    .inner-border.active {
        transform: rotate(45deg) scale(1);
    }

    /* 主UI层 */
    .ui-layer {
        position: relative;
        z-index: 10;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    /* 顶部文字 */
    .top-right {
        position: absolute;
        top: 3%;
        right: 3%;
        font-size: 13px;
        /* letter-spacing: 1.5px; */
        opacity: 0;
        transition: opacity 0.5s;
    }
    .top-right::before {
        content: '■';
        margin-right: 8px;
        font-size: 10px;
        vertical-align: middle;
    }

    /* 底部文字 */
    .bottom-text {
        position: absolute;
        bottom: 5%;
        font-size: 11px;
        text-align: center;
        opacity: 0;
        transition: opacity 0.5s;
        /* letter-spacing: 2px; */
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .bottom-text strong { font-weight: 900; }
    .bottom-deco {
        display: flex;
        align-items: center;
        margin-top: 10px;
        width: 300px;
    }
    .bottom-line { flex: 1; height: 1px; background: #000; }
    .bottom-diamond { width: 6px; height: 6px; background: #000; transform: rotate(45deg); margin: 0 15px; }

    /* Logo 区域 */
    .logo-wrapper {
        position: absolute;
        transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        display: flex;
        align-items: center;
    }
/* 修改后的 Logo 区域 */
    .logo-deco {
        width: 0;
        height: 75px; /* 文字变成上下两排后总高度增加，拉长左侧的黑线进行匹配 */
        background: black;
        transition: width 0.4s;
        margin-right: 12px;
    }
    .logo-text-group { 
        opacity: 0; 
        transition: opacity 0.5s; 
        display: flex; 
        flex-direction: column; /* 改为纵向排列，让小字落到下方 */
        align-items: flex-start; /* 整体向左对齐 */
    }
    .logo-main {
        font-size: 80px;
        font-weight: 900;
        /* letter-spacing: -3px; */
        line-height: 0.8;
    }
    .logo-sub-group { 
        margin-top: 8px; /* 取消原来的 margin-left，改为上间距 */
        display: flex; 
        flex-direction: column; 
    }
    .logo-sub {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1px;
    }
    .logo-sub2 {
        font-size: 16px;
        font-weight: 400;
        letter-spacing: 2px;
        display: flex;
        align-items: baseline;
    }
    .logo-os { 
        font-weight: 900; 
        font-size: 20px; 
        margin-left: 8px; /* 调整 ANALYSIS 和 OS 之间的空隙 */
    }

    /* 登录表单 */
/* 登录表单：移动到屏幕正中央 */
    .login-form {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%); /* 绝对居中 */
        opacity: 0;
        transition: opacity 0.3s;
        text-align: left;
    }
    .form-row {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        font-size: 16px;
    }
    .label {
        width: 120px;
        text-align: right;
        margin-right: 15px;
        font-weight: 500;
    }
    .input-val {
        font-family: monospace;
        min-width: 160px;
        font-size: 16px;
        letter-spacing: 2px;
    }
    .forgot-pass {
        color: rgb(136, 136, 136);
        font-size: 8px;
        font-weight: bold;
        margin-left: 24px;
        margin-top: 2px;
    }

    /* Glitch 黑块转场 */
    .glitch-box {
        position: absolute;
        left: 53%;
        top: 50%;
        margin-left: -50px; 
        margin-top: -50px; /* 利用负 margin 居中，避免和 JS 中的 scale() 动画冲突 */
        width: 100px;
        height: 100px;
        background: #000;
        opacity: 0;
        transform: scale(0);
        transform-origin: center; /* 从正中心向四周爆发放大 */
        z-index: 20;
    }

    /* ACCESS 文本 */
    .access-text {
        position: absolute;
        font-size: 72px;
        font-weight: 900;
        letter-spacing: 5px;
        opacity: 0;
        transform: translateX(50px);
        transition: opacity 0.2s, transform 0.4s ease-out;
    }
    
    /* PLEASE LOG IN 横幅 */
    .banner {
        position: absolute;
        background: black;
        color: white;
        font-size: 48px;
        font-weight: 900;
        padding: 5px 60px;
        opacity: 0;
        transform: scaleY(0);
        transform-origin: center;
        transition: transform 0.15s ease-out, opacity 0.1s;
        letter-spacing: -1px;
    }

    /* 加载条区域 */
    .loading-area {
        position: absolute;
        width: 600px;
        opacity: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .loading-track {
        width: 100%;
        height: 24px;
        position: relative;
        display: flex;
        align-items: center;
    }
    .loading-bar-fill {
        height: 100%;
        background: black;
        width: 0%;
        transition: width 0.2s linear;
    }
    .loading-hashes {
        position: absolute;
        right: -60px;
        top: 0;
        height: 100%;
        width: 50px;
        background: repeating-linear-gradient(
            60deg,
            transparent,
            transparent 4px,
            #000 4px,
            #000 6px
        );
        opacity: 0;
        transition: opacity 0.3s;
    }
    .loading-percent {
        margin-top: 15px;
        font-size: 22px;
        font-weight: 900;
        font-family: 'Arial', sans-serif;
    }

    /* 欢迎文字（优化版） */
    .welcome-msg {
        position: absolute;
        font-size: 40px;
        font-weight: 900;
        letter-spacing: 12px; /* 初始间距拉大 */
        opacity: 0;
        transform: scale(0.95);
        filter: blur(4px); /* 初始状态略微模糊 */
        transition: all 1.5s cubic-bezier(0.2, 1, 0.3, 1);
    }
    /* 激活后的状态 */
    .welcome-msg.active {
        opacity: 1;
        letter-spacing: 2px; /* 间距平滑收缩到正常值 */
        transform: scale(1);
        filter: blur(0);
    }

    .fade-in { opacity: 1 !important; }
</style>
</head>
<body>

    <div class="intro-lines" id="introLines"></div>

    <div class="diamond-bg" id="diamondBg"></div>
    <div class="inner-border" id="innerBorder"></div>

    <div class="ui-layer">
        <div class="top-right" id="topRight">POWERED BY RHODES ISLAND</div>

        <div class="logo-wrapper" id="logoWrapper">
            <!-- 隐藏deco,同步注释js部分 -->
            <!-- <div class="logo-deco" id="logoDeco"></div> -->
            <div class="logo-text-group" id="logoGroup">
                <div class="logo-main">PRTS</div>
                <div class="logo-sub-group">
                    <div class="logo-sub">SYNTHESIZE INFORMATION</div>
                    <div class="logo-sub2">ANALYSIS <span class="logo-os">OS</span></div>
                </div>
            </div>
        </div>

        <div class="login-form" id="loginForm">
            <div class="form-row">
                <span class="label">USERNAME:</span>
                <span class="input-val" id="usernameVal"></span>
            </div>
            <div class="form-row" style="margin-bottom: 2px;">
                <span class="label">PASSWORD:</span>
                <span class="input-val" id="passwordVal"></span>
            </div>
            <div class="forgot-pass">FORGOT YOUR PASSWORD?</div>
        </div>

        <div class="glitch-box" id="glitchBox"></div>
        <div class="access-text" id="accessText">ACCESS</div>
        <div class="banner" id="banner">PLEASE LOG IN</div>

        <div class="loading-area" id="loadingArea">
            <div class="loading-track">
                <div class="loading-bar-fill" id="loadingFill"></div>
                <div class="loading-hashes" id="loadingHashes"></div>
            </div>
            <div class="loading-percent" id="loadingText">28%</div>
        </div>

        <div class="welcome-msg" id="welcomeMsg"></div>

        <div class="bottom-text" id="bottomText">
            <div>PRIMITIVE <strong>RHODES ISLAND</strong> TERMINAL SERVICE</div>
            <div>SYSTEM [OS]</div>
            <div class="bottom-deco">
                <div class="bottom-line"></div>
                <div class="bottom-diamond"></div>
                <div class="bottom-line"></div>
            </div>
        </div>
    </div>

<script>
    const timeline = [
        // 0.2s - 菱形展开
        { time: 200, action: () => {
            // document.getElementById('introLines').classList.add('hidden');
            document.getElementById('diamondBg').classList.add('active');
            document.getElementById('innerBorder').classList.add('active');
        }},

        // 0.5s - 中线出现
        { time: 500, action: () => document.getElementById('introLines').classList.add('step1') },
        // 0.6s - 线分开形成矩形
        { time: 600, action: () => document.getElementById('introLines').classList.add('step2') },
        


        // 2.0s - Logo 出现
        { time: 800, action: () => {
            document.getElementById('logoGroup').classList.add('fade-in');
            // document.getElementById('logoDeco').style.width = '2px';
        }},
        // 3.0s - Logo 左移，周边文字浮现
        { time: 2000, action: () => {
            // 将原来的 -220px 加大到 -380px，给中间的表单腾出足够空间
            document.getElementById('logoWrapper').style.transform = 'translateX(-580px)';
            document.getElementById('introLines').style.transform = 'translateX(-580px)';
            
            document.getElementById('topRight').classList.add('fade-in');
            document.getElementById('bottomText').classList.add('fade-in');
        }},
        // 4.0s - 表单出现，录入用户名
        { time: 3000, action: () => {
            document.getElementById('loginForm').classList.add('fade-in');
            typeText('usernameVal', 'Doctor', 100); 
        }},
        // 5.5s - 录入密码
        { time: 4500, action: () => typeDots('passwordVal', 12, 80) },
        // 7.5s - 黑块覆盖密码区 (Glitch转场)
        { time: 6500, action: () => {
            const glitch = document.getElementById('glitchBox');
            glitch.style.opacity = '1';
            glitch.style.transform = 'scale(1.2)';
            setTimeout(() => {
                // 关键修复：移除 fade-in 类，让表单原有的 opacity: 0 重新生效并触发渐隐
                document.getElementById('loginForm').classList.remove('fade-in');
                // 同步擦除 Logo
                // document.getElementById('logoWrapper').style.opacity = '0'; 
                
                glitch.style.transform = 'scale(10)'; // 放大淹没视线
                glitch.style.opacity = '0';
            }, 300);
        }},
        // 8.5s - ACCESS 文字出现
        { time: 8500, action: () => {
            const access = document.getElementById('accessText');
            access.style.opacity = '1';
            access.style.transform = 'translateX(0)';
        }},
        // 9.5s - ACCESS 消失
        { time: 9500, action: () => document.getElementById('accessText').style.opacity = '0' },
        // 10.0s - PLEASE LOG IN 横幅展开，随后闪烁2次并淡出
        { time: 10000, action: () => {
            const banner = document.getElementById('banner');
            
            // 1. 瞬间展开
            banner.style.transition = 'transform 0.15s ease-out, opacity 0.1s'; // 确保初始动画速度
            banner.style.opacity = '1';
            banner.style.transform = 'scaleY(1)';

            // 2. 第一次闪烁 (变暗 -> 恢复)
            setTimeout(() => banner.style.opacity = '0', 400);
            setTimeout(() => banner.style.opacity = '1', 500);

            // 3. 第二次闪烁 (变暗 -> 恢复)
            setTimeout(() => banner.style.opacity = '0', 700);
            setTimeout(() => banner.style.opacity = '1', 800);

            // 4. 缩短存在时间，并在 1.2秒 时柔和淡出并收起 (原版为2.0秒)
            setTimeout(() => {
                banner.style.transition = 'transform 0.2s ease-out, opacity 0.4s'; // 加长透明度变化时间，实现"淡出"效果
                banner.style.opacity = '0';
                banner.style.transform = 'scaleY(0)';
            }, 1200);
        }},
        // 12.0s - 横幅收起
        { time: 12000, action: () => {
            const banner = document.getElementById('banner');
            banner.style.transform = 'scaleY(0)';
            setTimeout(() => banner.style.opacity = '0', 200);
        }},
        // 13.0s - 加载条出现 (初始28%)
        { time: 13000, action: () => {
            document.getElementById('loadingArea').classList.add('fade-in');
            document.getElementById('loadingHashes').style.opacity = '1';
            document.getElementById('loadingFill').style.width = '28%';
            setTimeout(startLoading, 500); // 停顿一下后开始加载
        }},
        // 16.0s - 加载条消失，中心清空
        { time: 16000, action: () => {
            document.getElementById('loadingArea').classList.remove('fade-in');
        }},
        // 18.0s - 乱码 Welcome
        // 18.0s - 触发文字平滑淡入与解码动画
        { time: 18000, action: () => {
            const msg = document.getElementById('welcomeMsg');
            msg.classList.add('active'); // 触发 CSS 视觉过渡（淡入、缩放、去模糊）
            decodeText('welcomeMsg', 'WELCOME BACK DOCTOR', 1200); // 执行 1.2 秒的乱码解码
        }},
        // 18.8s - 完整 Welcome
        { time: 18800, action: () => {
            document.getElementById('welcomeMsg').innerText = 'WELCOME BACK DOCTOR';
        }}
    ];

    const startTime = Date.now();
    function runTimeline() {
        const elapsed = Date.now() - startTime;
        timeline.forEach(event => {
            if (!event.executed && elapsed >= event.time) {
                event.action();
                event.executed = true;
            }
        });
        if (elapsed < 20000) requestAnimationFrame(runTimeline);
    }
    window.onload = () => requestAnimationFrame(runTimeline);

    function typeText(id, text, speed) {
        const el = document.getElementById(id);
        let i = 0;
        const iv = setInterval(() => {
            el.innerText = text.substring(0, i + 1);
            if (++i >= text.length) clearInterval(iv);
        }, speed);
    }

    // 终端字符解码动画
    function decodeText(id, targetText, duration) {
        const el = document.getElementById(id);
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_';
        const steps = duration / 40; // 更新频率
        let step = 0;
        
        const iv = setInterval(() => {
            step++;
            const progress = step / steps;
            
            // 动画结束，确保文本完全正确
            if (progress >= 1) {
                el.innerText = targetText;
                clearInterval(iv);
                return;
            }
            
            // 逐字计算当前应该显示的字符
            let current = '';
            for (let i = 0; i < targetText.length; i++) {
                if (targetText[i] === ' ') {
                    current += ' ';
                } else if (Math.random() < progress) {
                    // 随着进度推进，显示正确字符的概率越来越高
                    current += targetText[i];
                } else {
                    // 否则显示随机乱码字符
                    current += chars[Math.floor(Math.random() * chars.length)];
                }
            }
            el.innerText = current;
        }, 40);
    }

    function typeDots(id, count, speed) {
        const el = document.getElementById(id);
        let i = 0;
        const iv = setInterval(() => {
            el.innerText += '*';
            if (++i >= count) clearInterval(iv);
        }, speed);
    }

    function startLoading() {
        const fill = document.getElementById('loadingFill');
        const text = document.getElementById('loadingText');
        let progress = 28;
        const iv = setInterval(() => {
            progress += (Math.random() * 8);
            if (progress >= 100) {
                progress = 100;
                clearInterval(iv);
            }
            fill.style.width = progress + '%';
            text.innerText = Math.floor(progress) + '%';
        }, 120);
    }
</script>
</body>
</html>
